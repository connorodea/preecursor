# nginx virtual-host config for preecursor.com
#
# INSTALLATION (one-time, on the VPS):
#   sudo cp deploy/nginx.preecursor.conf /etc/nginx/sites-available/preecursor.conf
#   sudo ln -s /etc/nginx/sites-available/preecursor.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS / HTTPS:
#   After DNS is live, run:
#     sudo certbot --nginx -d preecursor.com -d www.preecursor.com
#   Certbot will add a 443 server block and HTTP→HTTPS redirect automatically.
#   The 80 block below will be rewritten by certbot; this file documents
#   the intended base configuration before certbot runs.

# ── HTTP → HTTPS redirect (certbot inserts/manages this) ──────────────────
# Keeping a placeholder here so the intent is explicit:
#   server {
#       listen 80;
#       server_name preecursor.com www.preecursor.com;
#       return 301 https://$host$request_uri;
#   }

# ── Primary server block (HTTP — certbot upgrades to 443) ─────────────────
server {
    listen 80;
    listen [::]:80;
    server_name preecursor.com www.preecursor.com;

    # Static export root — rsync delivers files here from GitHub Actions.
    root /var/www/preecursor;
    index index.html;

    # ── Routing for Next.js static export with trailingSlash: true ──────────
    # next build emits /about/index.html, /contact/index.html, etc.
    # Try the exact URI, then URI/, then URI.html (handles links without slash),
    # fall back to 404.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ── Custom 404 page (emitted by Next.js as /404.html) ───────────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ── Long-lived immutable cache for Next.js hashed static assets ─────────
    # /_next/static/ filenames contain a content hash — safe to cache forever.
    location /_next/static/ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Public directory assets (images, favicons, etc.) ────────────────────
    location /public/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Security headers ─────────────────────────────────────────────────────
    # Applied to all responses from this server block.
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header X-Frame-Options           "SAMEORIGIN"       always;
    add_header X-XSS-Protection          "1; mode=block"    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    # Content-Security-Policy intentionally omitted here — tune it once
    # all third-party scripts (analytics, fonts, etc.) are known.

    # ── Deny access to dotfiles (e.g. .git, .env) ───────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
